name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APPS_SCRIPT_DEPLOYMENT_ID: ${{ vars.APPS_SCRIPT_DEPLOYMENT_ID }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Create Credential File
        run: printf "%s" "${{ secrets.CLASPRC_JSON }}" | base64 --decode > ~/.clasprc.json

      - name: Validate Apps Script Files
        run: |
          test -f .clasp.json
          test -f appsscript.json
          test -f code.gs
          test -f app.js

      - name: Resolve Apps Script Deployment Config
        run: |
          if [ -z "$APPS_SCRIPT_DEPLOYMENT_ID" ]; then
            echo "Missing repository variable APPS_SCRIPT_DEPLOYMENT_ID"
            exit 1
          fi

          APPS_SCRIPT_WEB_APP_URL="https://script.google.com/macros/s/${APPS_SCRIPT_DEPLOYMENT_ID}/exec"

          echo "APPS_SCRIPT_WEB_APP_URL=$APPS_SCRIPT_WEB_APP_URL" >> "$GITHUB_ENV"

      - name: Push Code
        run: clasp push -f

      - name: Deploy & Versioning
        run: |
          # Getting the current time in IST (India Standard Time)
          TIMESTAMP=$(TZ='Asia/Kolkata' date +'%Y-%m-%d %I:%M %p')
          clasp deploy -i "$APPS_SCRIPT_DEPLOYMENT_ID" -d "GitHub Auto-Deploy: $TIMESTAMP"

      - name: Verify Live Apps Script Web App
        run: |
          echo "Verifying Apps Script health at: $APPS_SCRIPT_WEB_APP_URL?resource=requirements"

          for attempt in 1 2 3 4 5; do
            echo "Health check attempt $attempt"

            if curl -fsSL "$APPS_SCRIPT_WEB_APP_URL?resource=requirements" -o apps_script_health.json; then
              if node -e "const fs=require('fs'); const payload=JSON.parse(fs.readFileSync('apps_script_health.json','utf8')); if (!Array.isArray(payload)) throw new Error('Expected requirements array payload');"; then
                echo "Apps Script health check passed."
                exit 0
              fi
            fi

            sleep 10
          done

          echo "Apps Script health check failed after deployment."
          exit 1
